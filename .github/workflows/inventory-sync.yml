name: Sync Vehicle Inventory (Wiegand)

on:
  schedule:
    - cron: '0 */4 * * *' # Alle 4 Stunden
  workflow_dispatch:
    inputs:
      log_id:
        description: 'Existing log entry ID to update'
        required: false
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Diagnostic - Check Secrets
        run: |
          echo "Checking which secrets are available (values are masked):"
          [ -n "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}${{ secrets.SUPABASE_URL }}" ] && echo "✅ SUPABASE_URL: Found" || echo "❌ SUPABASE_URL: Missing"
          [ -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}${{ secrets.SERVICE_ROLE_KEY }}${{ secrets.SUPABASE_KEY }}" ] && echo "✅ SUPABASE_SERVICE_ROLE_KEY: Found" || echo "❌ SUPABASE_SERVICE_ROLE_KEY: Missing"
          [ -n "${{ secrets.SFTP_HOST }}" ] && echo "✅ SFTP_HOST: Found" || echo "❌ SFTP_HOST: Missing"
          [ -n "${{ secrets.SFTP_PASSWORD }}" ] && echo "✅ SFTP_PASSWORD: Found" || echo "❌ SFTP_PASSWORD: Missing"

      - name: Run Sync Script
        run: npx tsx src/scripts/run-sync.ts ${{ github.event.inputs.log_id }}
        env:
          # Supabase fallbacks (accepts any naming convention)
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SERVICE_ROLE_KEY || secrets.SUPABASE_KEY }}
          
          # SFTP fallbacks
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_PORT: ${{ secrets.SFTP_PORT || '22' }}
          SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
